<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>أثر | أحمد بالي</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800&family=Amiri:wght@400;700&display=swap" rel="stylesheet">

<style>

:root{
--gold:#d4af37;
--bg:#0c0c0c;
--card:#171717;
--text:#f4f4f4;
--muted:#aaaaaa;
--border:rgba(212,175,55,.2);
}

*{
margin:0;
padding:0;
box-sizing:border-box;
scroll-behavior:smooth;
}

body{
background:var(--bg);
color:var(--text);
font-family:'Cairo',sans-serif;
overflow-x:hidden;
}

body::before{
content:'';
position:fixed;
inset:0;
background:radial-gradient(circle at top,#1f1a0d 0%,#0c0c0c 40%);
z-index:-1;
}

nav{
position:sticky;
top:0;
z-index:999;
background:rgba(10,10,10,.92);
backdrop-filter:blur(10px);
padding:18px 6%;
display:flex;
align-items:center;
justify-content:space-between;
border-bottom:1px solid var(--border);
}

.logo{
font-size:2rem;
font-family:'Amiri',serif;
color:var(--gold);
font-weight:700;
text-decoration:none;
}

.nav-links{
display:flex;
gap:25px;
}

.nav-links a{
text-decoration:none;
color:#ddd;
font-size:1rem;
transition:.3s;
}

.nav-links a:hover{
color:var(--gold);
}

.hero{
padding:90px 6% 70px;
display:grid;
grid-template-columns:1fr 320px;
gap:60px;
align-items:center;
}

.hero h1{
font-size:4rem;
line-height:1.3;
font-family:'Amiri',serif;
}

.hero h1 span{
color:var(--gold);
}

.hero p{
margin-top:20px;
line-height:2;
font-size:1.1rem;
color:#c7c7c7;
max-width:700px;
}

.hero-image{
width:320px;
height:320px;
border-radius:50%;
overflow:hidden;
border:4px solid var(--gold);
background:#111;
box-shadow:0 0 40px rgba(212,175,55,.15);
}

.hero-image img{
width:100%;
height:100%;
object-fit:cover;
}

.hero-image .placeholder{
width:100%;
height:100%;
display:flex;
align-items:center;
justify-content:center;
font-size:5rem;
color:var(--gold);
font-family:'Amiri',serif;
}

.section-title{
font-size:2rem;
margin-bottom:30px;
font-family:'Amiri',serif;
}

.container{
padding:0 6% 80px;
}

.search{
margin-bottom:30px;
}

.search input{
width:100%;
padding:16px 20px;
background:#111;
border:1px solid var(--border);
color:#fff;
font-size:1rem;
border-radius:10px;
outline:none;
}

.playlist{
display:flex;
flex-direction:column;
gap:18px;
}

.article{
background:var(--card);
border:1px solid var(--border);
border-radius:18px;
overflow:hidden;
transition:.3s;
cursor:pointer;
display:flex;
gap:20px;
}

.article:hover{
transform:translateY(-3px);
border-color:var(--gold);
}

.article-thumb{
width:280px;
height:180px;
background:#111;
flex-shrink:0;
overflow:hidden;
}

.article-thumb img{
width:100%;
height:100%;
object-fit:cover;
}

.article-body{
padding:20px;
flex:1;
}

.article-title{
font-size:1.6rem;
margin-bottom:10px;
font-family:'Amiri',serif;
}

.article-desc{
color:#bdbdbd;
line-height:1.9;
margin-bottom:18px;
}

.article-date{
color:var(--gold);
font-size:.95rem;
}

.reader-page{
position:fixed;
inset:0;
background:#0a0a0a;
z-index:5000;
overflow-y:auto;
display:none;
padding:60px 8%;
}

.reader-page.active{
display:block;
}

.close-reader{
position:fixed;
top:25px;
left:25px;
background:#111;
border:1px solid var(--gold);
color:var(--gold);
padding:10px 18px;
cursor:pointer;
border-radius:10px;
}

.reader-content{
max-width:900px;
margin:auto;
}

.reader-content h1{
font-size:3rem;
margin-bottom:25px;
font-family:'Amiri',serif;
}

.reader-date{
margin-bottom:35px;
color:var(--gold);
}

.reader-text{
font-size:1.3rem;
line-height:2.5;
color:#ededed;
white-space:pre-line;
}

.next-article{
margin-top:70px;
padding-top:40px;
border-top:1px solid var(--border);
}

.next-article button{
margin-top:20px;
padding:14px 28px;
background:var(--gold);
color:#000;
border:none;
border-radius:10px;
font-weight:700;
cursor:pointer;
}

.admin-btn{
position:fixed;
bottom:25px;
left:25px;
width:60px;
height:60px;
border-radius:50%;
border:none;
background:var(--gold);
color:#000;
font-size:1.4rem;
font-weight:bold;
cursor:pointer;
box-shadow:0 10px 30px rgba(212,175,55,.2);
}

.panel{
position:fixed;
inset:0;
background:rgba(0,0,0,.8);
display:none;
align-items:center;
justify-content:center;
z-index:7000;
}

.panel.active{
display:flex;
}

.panel-box{
width:min(700px,95vw);
max-height:90vh;
overflow:auto;
background:#111;
padding:35px;
border-radius:20px;
border:1px solid var(--border);
}

.panel-box input,
.panel-box textarea{
width:100%;
padding:15px;
margin-top:12px;
margin-bottom:20px;
background:#1b1b1b;
border:1px solid #333;
color:#fff;
border-radius:10px;
font-family:'Cairo',sans-serif;
}

.panel-box textarea{
min-height:200px;
resize:vertical;
}

.panel-box button{
padding:14px 28px;
background:var(--gold);
color:#000;
border:none;
border-radius:10px;
font-weight:700;
cursor:pointer;
}

.success{
margin-top:15px;
color:#6bff93;
display:none;
}

footer{
padding:40px 6%;
text-align:center;
border-top:1px solid var(--border);
color:#999;
}

footer strong{
color:#fff;
}

@media(max-width:900px){
.hero{
grid-template-columns:1fr;
text-align:center;
}

.hero-image{
margin:auto;
width:250px;
height:250px;
}

.article{
flex-direction:column;
}

.article-thumb{
width:100%;
height:220px;
}

.hero h1{
font-size:2.7rem;
}

.reader-content h1{
font-size:2.2rem;
}

.reader-text{
font-size:1.1rem;
line-height:2.2;
}
}

</style>
</head>
<body>

<nav>
<a href="#" class="logo">أثر</a>

<div class="nav-links">
<a href="#">الرئيسية</a>
<a href="#articles">المقالات</a>
</div>
</nav>

<section class="hero">
<div>
<h1>أحمد <span>بالي</span></h1>
<p>
كاتب وناقد يهتم بالأدب والسينما والكتابة الثقافية.
مساحة خاصة لنشر المقالات والتأملات النقدية بأسلوب هادئ وبصري مريح للقراءة.
</p>
</div>

<div class="hero-image" id="heroImage">
<div class="placeholder">أ</div>
</div>
</section>

<section class="container" id="articles">
<h2 class="section-title">المقالات</h2>

<div class="search">
<input type="text" id="searchInput" placeholder="ابحث داخل المقالات...">
</div>

<div class="playlist" id="articlesContainer"></div>
</section>

<div class="reader-page" id="readerPage">
<button class="close-reader" onclick="closeReader()">إغلاق</button>

<div class="reader-content">
<h1 id="readerTitle"></h1>
<div class="reader-date" id="readerDate"></div>
<div class="reader-text" id="readerText"></div>

<div class="next-article" id="nextArticle"></div>
</div>
</div>

<button class="admin-btn" onclick="openPanel()">+</button>

<div class="panel" id="panel">
<div class="panel-box">
<h2 style="margin-bottom:20px">لوحة التحكم</h2>

<input type="password" id="password" placeholder="كلمة المرور">
<button onclick="login()">دخول</button>

<div id="adminArea" style="display:none;margin-top:30px">

<input type="text" id="title" placeholder="عنوان المقال">

<textarea id="content" placeholder="اكتب المقال هنا..."></textarea>

<input type="file" id="thumb">
<input type="file" id="avatarInput">

<button onclick="publishArticle()">نشر المقال</button>

<div class="success" id="successMsg">✓ تم النشر بنجاح</div>
<div class="success" id="avatarMsg">✓ تم حفظ الصورة الشخصية</div>

</div>
</div>
</div>

<footer>
جميع الحقوق محفوظة © <strong>أحمد بالي</strong>
</footer>

<script>

const STORAGE='athar_articles';
const AVATAR='athar_avatar';
const PASS='ahmed2024';

let articles=JSON.parse(localStorage.getItem(STORAGE)) || [];
let avatar=localStorage.getItem(AVATAR);

function renderAvatar(){
if(avatar){
document.getElementById('heroImage').innerHTML=`<img src="${avatar}">`;
}
}

renderAvatar();

function renderArticles(list=articles){
const container=document.getElementById('articlesContainer');

if(!list.length){
container.innerHTML='<p style="color:#888">لا توجد مقالات منشورة حتى الآن</p>';
return;
}

container.innerHTML=list.map((article,index)=>`
<div class="article" onclick="openArticle(${index})">
<div class="article-thumb">
${article.thumb ? `<img src="${article.thumb}">` : ''}
</div>

<div class="article-body">
<div class="article-title">${article.title}</div>
<div class="article-desc">${article.content.substring(0,180)}...</div>
<div class="article-date">${article.date}</div>
</div>
</div>
`).join('');
}

renderArticles();

function openArticle(index){
const article=articles[index];

document.getElementById('readerTitle').textContent=article.title;
document.getElementById('readerDate').textContent=article.date;
document.getElementById('readerText').textContent=article.content;

document.getElementById('readerPage').classList.add('active');

const next=articles[index+1];

if(next){
document.getElementById('nextArticle').innerHTML=`
<h3>اقرأ بعد ذلك</h3>
<button onclick="openArticle(${index+1})">${next.title}</button>
`;
}else{
document.getElementById('nextArticle').innerHTML='';
}
}

function closeReader(){
document.getElementById('readerPage').classList.remove('active');
}

function openPanel(){
document.getElementById('panel').classList.add('active');
}

window.addEventListener('click',e=>{
if(e.target.id==='panel'){
document.getElementById('panel').classList.remove('active');
}
});

function login(){
const pass=document.getElementById('password').value;

if(pass===PASS){
document.getElementById('adminArea').style.display='block';
}else{
alert('كلمة المرور غير صحيحة');
}
}

function publishArticle(){
const title=document.getElementById('title').value.trim();
const content=document.getElementById('content').value.trim();
const thumb=document.getElementById('thumb').files[0];

if(!title || !content){
alert('أكمل بيانات المقال');
return;
}

const save=(image=null)=>{
articles.unshift({
title,
content,
thumb:image,
date:new Date().toLocaleDateString('ar-EG',{year:'numeric',month:'long',day:'numeric'})
});

localStorage.setItem(STORAGE,JSON.stringify(articles));

renderArticles();

const msg=document.getElementById('successMsg');
msg.style.display='block';

setTimeout(()=>{
msg.style.display='none';
},2500);

document.getElementById('title').value='';
document.getElementById('content').value='';
document.getElementById('thumb').value='';
}

if(thumb){
const reader=new FileReader();
reader.onload=e=>save(e.target.result);
reader.readAsDataURL(thumb);
}else{
save();
}
}


document.getElementById('avatarInput').addEventListener('change',function(){
const file=this.files[0];

if(!file) return;

const reader=new FileReader();

reader.onload=e=>{
avatar=e.target.result;
localStorage.setItem(AVATAR,avatar);
renderAvatar();

const msg=document.getElementById('avatarMsg');
msg.style.display='block';

setTimeout(()=>{
msg.style.display='none';
},2500);
}

reader.readAsDataURL(file);
});


document.getElementById('searchInput').addEventListener('input',function(){
const value=this.value.toLowerCase();

const filtered=articles.filter(article=>
article.title.toLowerCase().includes(value) ||
article.content.toLowerCase().includes(value)
);

renderArticles(filtered);
});

</script>

</body>
</html>
```
