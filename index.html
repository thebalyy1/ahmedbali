<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>أحمد بالي — الموقع الرسمي</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&family=Amiri:wght@400;700&display=swap" rel="stylesheet">

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";

import {
  getDatabase,
  ref,
  get,
  update,
  remove,
  onValue,
  push
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

import {
  getAuth,
  signInWithEmailAndPassword,
  signOut,
  onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyCMyu8DSBA5vddBD8i_rDVvXPOkmlWtqNA",
  authDomain: "ahmed-bali.firebaseapp.com",
  databaseURL: "https://ahmed-bali-default-rtdb.firebaseio.com",
  projectId: "ahmed-bali",
  storageBucket: "ahmed-bali.firebasestorage.app",
  messagingSenderId: "890726782690",
  appId: "1:890726782690:web:33d96a5406dad4e70730bb"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const auth = getAuth(app);

window._firebase = {
  db,
  ref,
  get,
  update,
  remove,
  push,
  auth,
  signInWithEmailAndPassword,
  signOut
};

onValue(ref(db, "site"), snapshot => {
  window._siteData = snapshot.val() || {};

  if (window.renderSite) {
    window.renderSite(window._siteData);
  }
});

onAuthStateChanged(auth, user => {
  window._currentUser = user || null;
});
</script>

<style>
:root{
  --gold:#C9A84C;
  --bg:#0d0d0d;
  --card:#171717;
  --text:#f3f3f3;
  --muted:#a5a5a5;
  --border:rgba(255,255,255,.08);
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  background:var(--bg);
  color:var(--text);
  font-family:'Cairo',sans-serif;
}

nav{
  height:72px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 6%;
  border-bottom:1px solid var(--border);
}

.logo{
  font-size:1.7rem;
  color:#fff;
  font-weight:900;
}

.hero{
  padding:80px 6%;
  text-align:center;
}

.hero h1{
  font-size:4rem;
  margin-bottom:10px;
}

.hero p{
  color:#ccc;
  line-height:2;
  max-width:850px;
  margin:auto;
}

.articles{
  padding:60px 6%;
}

.section-title{
  text-align:center;
  margin-bottom:40px;
  font-size:2rem;
}

.articles-grid{
  display:flex;
  flex-direction:column;
  gap:20px;
}

.article-card{
  background:var(--card);
  border-radius:18px;
  padding:24px;
  border:1px solid var(--border);
  cursor:pointer;
  transition:.3s;
}

.article-card:hover{
  transform:translateY(-4px);
}

.article-card h3{
  margin-bottom:12px;
  font-size:1.6rem;
}

.article-date{
  color:var(--gold);
  margin-bottom:15px;
}

.reader-page{
  position:fixed;
  inset:0;
  background:#0a0a0a;
  overflow-y:auto;
  z-index:9999;
  display:none;
  padding:80px 8%;
}

.reader-page.active{
  display:block;
}

.reader-close{
  position:fixed;
  top:20px;
  left:20px;
  width:44px;
  height:44px;
  border:none;
  border-radius:50%;
  background:var(--gold);
  cursor:pointer;
  font-size:1.2rem;
}

.reader-title{
  font-size:3rem;
  margin-bottom:20px;
}

.reader-date{
  color:var(--gold);
  margin-bottom:15px;
}

#readerReads{
  color:#ccc;
  margin-bottom:30px;
}

.reader-content{
  line-height:2.5;
  white-space:pre-line;
  font-size:1.1rem;
}

footer{
  border-top:1px solid var(--border);
  padding:35px 6%;
  text-align:center;
  color:#aaa;
  margin-top:60px;
}

.footer-dev{
  color:var(--gold);
  font-weight:700;
}

#visitorsCount{
  margin-top:12px;
  color:var(--gold);
}
</style>
</head>

<body>

<nav>
  <div class="logo">أحمد بالي</div>
</nav>

<section class="hero">
  <h1>أحمد بالي</h1>
  <p id="heroBio">
    كاتب ومخرج وروائي وناقد فني مصري
  </p>
</section>

<section class="articles">
  <h2 class="section-title">المقالات</h2>

  <div class="articles-grid" id="articlesGrid">
  </div>
</section>

<div class="reader-page" id="readerPage">

  <button class="reader-close" onclick="closeReader()">
    ×
  </button>

  <h1 class="reader-title" id="readerTitle"></h1>

  <div class="reader-date" id="readerDate"></div>

  <div id="readerReads">
    القراء: 0
  </div>

  <div class="reader-content" id="readerContent"></div>

</div>

<footer>

  <div>
    جميع الحقوق محفوظة لـ أحمد بالي © 2026
  </div>

  <div style="margin-top:12px;">

    <a
      href="https://www.instagram.com/thebalyy?igsh=bnNsZ2hyYnVoYWw1"
      target="_blank"
      style="text-decoration:none;color:#aaa;"
    >

      Website By

      <span class="footer-dev">
        أحمد بالي
      </span>

      |

      Code Palmer

    </a>

  </div>

  <div id="visitorsCount">
    عدد الزوار: 0
  </div>

</footer>

<script type="module">

function waitForFirebase(cb,tries=0){
  if(window._firebase){
    cb();
  }else if(tries<50){
    setTimeout(()=>waitForFirebase(cb,tries+1),100);
  }
}

waitForFirebase(()=>{

const {
  db,
  ref,
  get,
  update
} = window._firebase;

window.renderSite=function(data){

  const grid=document.getElementById("articlesGrid");

  if(!data.articles){
    grid.innerHTML="<p>لا توجد مقالات</p>";
    return;
  }

  const articles=Object.entries(data.articles)
  .map(([k,v])=>({...v,_key:k}))
  .sort((a,b)=>b._ts-a._ts);

  grid.innerHTML="";

  articles.forEach(article=>{

    grid.innerHTML+=`
      <div class="article-card"
           onclick="openArticle('${article._key}')">

        <h3>${article.title}</h3>

        <div class="article-date">
          ${article.date}
        </div>

        <p>
          ${article.content.substring(0,180)}...
        </p>

      </div>
    `;

  });

};

window.openArticle=async function(key){

  const snap=await get(ref(db,`site/articles/${key}`));

  if(!snap.exists()) return;

  const article=snap.val();

  await update(ref(db,`site/articles/${key}`),{
    reads:(article.reads||0)+1
  });

  document.getElementById("readerTitle").innerText=
  article.title;

  document.getElementById("readerDate").innerText=
  "تاريخ النشر: " + article.date;

  document.getElementById("readerReads").innerText=
  "القراء: " + ((article.reads||0)+1);

  document.getElementById("readerContent").innerText=
  article.content;

  document.getElementById("readerPage")
  .classList.add("active");

};

window.closeReader=function(){

  document.getElementById("readerPage")
  .classList.remove("active");

};

const visitorKey="visitor_counted";

const visitorsRef=ref(db,"site/visitors");

(async()=>{

  try{

    const snap=await get(visitorsRef);

    let visitors=snap.exists()
    ? snap.val()
    : 0;

    if(!localStorage.getItem(visitorKey)){

      visitors++;

      await update(ref(db),{
        "site/visitors":visitors
      });

      localStorage.setItem(visitorKey,"true");

    }

    document.getElementById("visitorsCount")
    .innerText="عدد الزوار: "+visitors;

  }catch(e){
    console.log(e);
  }

})();

});
</script>

</body>
</html>
