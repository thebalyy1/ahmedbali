<div class="admin-panel" id="adminPanel">

<div class="admin-box">

<h2>
لوحة التحكم
</h2>

<input
type="password"
placeholder="كلمة المرور"
id="adminPassword"
/>

<button onclick="loginAdmin()">
دخول
</button>

<div id="adminContent" style="display:none; margin-top:20px;">

<h3 style="margin-bottom:15px;color:#C9A84C;">
تعديل الصورة الشخصية
</h3>

<input type="file" id="avatarUpload">

<h3 style="margin:25px 0 15px;color:#C9A84C;">
تعديل النبذة التعريفية
</h3>

<textarea
id="aboutInput"
placeholder="عن الموقع"
style="height:120px;"
></textarea>

<button onclick="saveAbout()">
حفظ النبذة
</button>

<hr style="margin:35px 0;border-color:rgba(255,255,255,.08);">

<h3 style="margin-bottom:15px;color:#C9A84C;">
إضافة أو تعديل مقال
</h3>

<input
type="text"
id="articleTitle"
placeholder="عنوان المقال"
/>

<textarea
id="articleContent"
placeholder="محتوى المقال"
style="height:200px;"
></textarea>

<input
type="text"
id="articleImage"
placeholder="رابط صورة المقال"
/>

<button onclick="publishArticle()">
نشر المقال
</button>

<hr style="margin:35px 0;border-color:rgba(255,255,255,.08);">

<h3 style="margin-bottom:20px;color:#C9A84C;">
إدارة المقالات
</h3>

<div id="adminArticlesList"></div>

<div class="success-message" id="successMessage">
تم الحفظ بنجاح ✓
</div>

</div>

</div>

</div>

<script>

let adminClicks = 0;

function handleSecretAdminClick(){

adminClicks++;

if(adminClicks >= 3){

openAdmin();

adminClicks = 0;

}

setTimeout(()=>{

adminClicks = 0;

},2000);

}

let siteData = JSON.parse(localStorage.getItem("ahmedBaliSite")) || {

password:"ahmed2024",

avatar:null,

about:"هذا الموقع فضاء نقدي خاص، لا يكتب فيه سواي. مساحة بعيدة عن ضجيج الشبكات الاجتماعية وقوانينها.",

articles:[

{
title:"بداية السرد بين الحلم والواقع",
date:"15 مايو 2026",
reads:124,
image:"https://images.unsplash.com/photo-1512820790803-83ca734da794?q=80&w=1200&auto=format&fit=crop",
content:"هذا نص تجريبي لمقال كامل.\n\nهنا يقرأ الزائر المقال وكأنه داخل كتاب حقيقي."
}

]

};

function saveData(){

localStorage.setItem(
"ahmedBaliSite",
JSON.stringify(siteData)
);

}

function renderSite(){

document.getElementById("aboutText").innerText =
siteData.about;

if(siteData.avatar){

document.getElementById("avatarFrame").innerHTML =
`<img src="${siteData.avatar}">`;

document.getElementById("authorAvatar").innerHTML =
`<img src="${siteData.avatar}">`;

}

renderArticles(siteData.articles);

}

function renderArticles(list){

const grid =
document.getElementById("articlesGrid");

grid.innerHTML = "";

list.forEach((article,index)=>{

grid.innerHTML += `

<div class="article-card" onclick="openArticle(${index})">

<div class="article-thumb">
<img src="${article.image}">
</div>

<div class="article-content">

<div>

<h3>
${article.title}
</h3>

<div class="article-date">
${article.date}
</div>

<div class="article-excerpt">
${article.content.substring(0,180)}...
</div>

</div>

<div class="read-more">
قراءة المقال →
</div>

</div>

</div>

`;

});

}

function openArticle(index){

const article = siteData.articles[index];

article.reads++;

saveData();

document.getElementById("readerPage")
.classList.add("active");

document.getElementById("readerTitle")
.innerText = article.title;

document.getElementById("readerDate")
.innerText = article.date;

document.getElementById("readerContent")
.innerText = article.content;

document.getElementById("authorMeta")
.innerHTML =

`
تاريخ النشر: ${article.date}
<br>
عدد القراءات: ${article.reads}
`;

const next = siteData.articles[index + 1];

if(next){

document.getElementById("nextArticle").innerHTML =

`
<h4>
المقال التالي
</h4>

<div
class="next-link"
onclick="openArticle(${index + 1})"
>

${next.title}

</div>
`;

}else{

document.getElementById("nextArticle").innerHTML = "";

}

window.scrollTo(0,0);

renderArticles(siteData.articles);

}

function closeReader(){

document.getElementById("readerPage")
.classList.remove("active");

}

function filterArticles(){

const value =
document.getElementById("searchInput")
.value
.toLowerCase();

const filtered =
siteData.articles.filter(article =>

article.title.toLowerCase().includes(value)

||

article.content.toLowerCase().includes(value)

);

renderArticles(filtered);

}

function openAdmin(){

document.getElementById("adminPanel")
.classList.add("active");

}

window.onclick = function(e){

if(e.target.id === "adminPanel"){

document.getElementById("adminPanel")
.classList.remove("active");

}

}

function loginAdmin(){

const pass =
document.getElementById("adminPassword")
.value;

if(pass === siteData.password){

document.getElementById("adminContent")
.style.display = "block";

document.getElementById("aboutInput")
.value = siteData.about;

renderAdminArticles();

}else{

alert("كلمة المرور غير صحيحة");

}

}

function saveAbout(){

siteData.about =
document.getElementById("aboutInput").value;

saveData();

renderSite();

showSuccess();

}

document
.getElementById("avatarUpload")
.addEventListener("change",function(){

const file=this.files[0];

if(!file) return;

const reader = new FileReader();

reader.onload = function(e){

siteData.avatar = e.target.result;

saveData();

renderSite();

showSuccess();

};

reader.readAsDataURL(file);

});

function publishArticle(){

const title =
document.getElementById("articleTitle").value;

const content =
document.getElementById("articleContent").value;

const image =
document.getElementById("articleImage").value;

if(!title || !content || !image){

alert("اكمل بيانات المقال");

return;

}

siteData.articles.unshift({

title,

content,

image,

reads:0,

date:new Date().toLocaleDateString("ar-EG",{
year:"numeric",
month:"long",
day:"numeric"
})

});

saveData();

renderSite();

renderAdminArticles();

showSuccess();

document.getElementById("articleTitle").value="";
document.getElementById("articleContent").value="";
document.getElementById("articleImage").value="";

}

function renderAdminArticles(){

const list =
document.getElementById("adminArticlesList");

if(!list) return;

list.innerHTML = "";

siteData.articles.forEach((article,index)=>{

list.innerHTML += `

<div style="
background:#101010;
padding:16px;
border-radius:14px;
margin-bottom:14px;
border:1px solid rgba(255,255,255,.06);
">

<div style="
font-size:1.1rem;
font-weight:bold;
margin-bottom:10px;
">
${article.title}
</div>

<div style="
display:flex;
gap:10px;
flex-wrap:wrap;
">

<button onclick="editArticle(${index})">
تعديل
</button>

<button
onclick="deleteArticle(${index})"
style="
background:#b3261e;
color:white;
"
>
حذف
</button>

</div>

</div>

`;

});

}

function deleteArticle(index){

const confirmDelete =
confirm("هل تريد حذف المقال؟");

if(!confirmDelete) return;

siteData.articles.splice(index,1);

saveData();

renderSite();

renderAdminArticles();

showSuccess();

}

function editArticle(index){

const article = siteData.articles[index];

document.getElementById("articleTitle").value =
article.title;

document.getElementById("articleContent").value =
article.content;

document.getElementById("articleImage").value =
article.image;

deleteArticle(index);

}

function showSuccess(){

const msg =
document.getElementById("successMessage");

msg.style.display = "block";

setTimeout(()=>{

msg.style.display = "none";

},2500);

}

renderSite();

</script>
