<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, get, update, remove, onValue, push }
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged }
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyCMyu8DSBA5vddBD8i_rDVvXPOkmlWtqNA",
  authDomain: "ahmed-bali.firebaseapp.com",
  databaseURL: "https://ahmed-bali-default-rtdb.firebaseio.com",
  projectId: "ahmed-bali",
  storageBucket: "ahmed-bali.firebasestorage.app",
  messagingSenderId: "890726782690",
  appId: "1:890726782690:web:33d96a5406dad4e70730bb"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const auth = getAuth(app);

window.currentLang = localStorage.getItem("siteLang") || "ar";

window.langData = {
  ar:{
    about:"عن الموقع",
    articles:"المقالات",
    search:"ابحث عن المقالات...",
    read:"قراءة المقال →",
    next:"المقال التالي",
    noArticles:"لا توجد مقالات",
    loading:"جاري تحميل المقالات...",
    share:"مشاركة المقال",
    external:"رابط العمل الفني أو المقال",
    critic:"مشاهدة الرابط",
    hero:"مخرج وروائي وسيناريست وناقد فني مصري"
  },
  en:{
    about:"About",
    articles:"Articles",
    search:"Search articles...",
    read:"Read Article →",
    next:"Next Article",
    noArticles:"No articles found",
    loading:"Loading articles...",
    share:"Share Article",
    external:"External Link",
    critic:"Open Link",
    hero:"Egyptian Director, Novelist, Screenwriter & Critic"
  }
};

function applyLanguage(){
  const t = window.langData[window.currentLang];

  document.documentElement.lang = window.currentLang;
  document.documentElement.dir = window.currentLang === "ar" ? "rtl" : "ltr";

  document.getElementById("aboutNav").innerText = t.about;
  document.getElementById("articlesNav").innerText = t.articles;
  document.getElementById("aboutTitle").innerText = t.about;
  document.getElementById("articlesTitle").innerText = t.articles;
  document.getElementById("searchInput").placeholder = t.search;
  document.getElementById("heroTitle").innerText = t.hero;
  document.getElementById("langBtn").innerText = window.currentLang === "ar" ? "EN" : "AR";

  if(window.renderSite) window.renderSite(window._siteData || {});
}

window.toggleLanguage = function(){
  window.currentLang = window.currentLang === "ar" ? "en" : "ar";
  localStorage.setItem("siteLang", window.currentLang);
  applyLanguage();
};

function compressImage(file,maxWidth,quality){
  return new Promise(resolve=>{
    const img = new Image();
    const url = URL.createObjectURL(file);

    img.onload = ()=>{
      const scale = Math.min(1,maxWidth/img.width);
      const w = Math.round(img.width*scale);
      const h = Math.round(img.height*scale);

      const c = document.createElement("canvas");
      c.width = w;
      c.height = h;

      c.getContext("2d").drawImage(img,0,0,w,h);

      URL.revokeObjectURL(url);

      resolve(c.toDataURL("image/jpeg",quality));
    };

    img.src = url;
  });
}

onValue(ref(db,"site"),snapshot=>{
  window._siteData = snapshot.val() || {};

  if(window.renderSite){
    window.renderSite(window._siteData);
  }

  applyLanguage();

  const loader = document.getElementById("loaderOverlay");
  if(loader) loader.classList.add("hidden");
});

onAuthStateChanged(auth,user=>{
  window._currentUser = user || null;

  if(window.onAuthChange){
    window.onAuthChange(user);
  }
});

window._firebase = {
  db,ref,get,update,remove,push,
  auth,signInWithEmailAndPassword,
  signOut,compressImage
};
</script>

<script type="module">

function waitForFirebase(cb,tries=0){

if(window._firebase){
cb();
}
else if(tries<50){
setTimeout(()=>waitForFirebase(cb,tries+1),100);
}

}

waitForFirebase(()=>{

const {
db,ref,get,update,remove,push,
auth,signInWithEmailAndPassword,
signOut,compressImage
} = window._firebase;

function articlesArray(data){

if(!data || !data.articles) return [];

return Object.entries(data.articles)
.map(([k,v])=>({...v,_key:k}))
.sort((a,b)=>b._ts-a._ts);

}

window.renderSite = function(data){

document.getElementById("aboutText").innerText = data.about || "";

document.getElementById("heroBio").innerText = data.bio || "";

if(data.avatarUrl){

const img = `<img src="${data.avatarUrl}">`;

document.getElementById("avatarFrame").innerHTML = img;

}

renderArticles(data);

};

function renderArticles(data){

const grid = document.getElementById("articlesGrid");

const q = document.getElementById("searchInput").value.toLowerCase();

const t = window.langData[window.currentLang];

const articles = articlesArray(data)
.filter(a=>

!a.private &&
(
q==="" ||
a.title.toLowerCase().includes(q) ||
a.content.toLowerCase().includes(q)
)

);

grid.innerHTML = "";

if(!articles.length){

grid.innerHTML = `
<p style="text-align:center;color:#aaa;padding:40px">
${t.noArticles}
</p>
`;

return;

}

articles.forEach(a=>{

grid.innerHTML += `
<div class="article-card" onclick="openArticle('${a._key}')">

<div class="article-thumb"
style="background-image:url('${a.imageUrl}')">
</div>

<div class="article-content">

<div>

<h3>${a.title}</h3>

<div class="article-date">${a.date}</div>

<div class="article-excerpt">
${a.content.substring(0,180)}...
</div>

</div>

<div class="read-more">
${t.read}
</div>

</div>

</div>
`;

});

}

window.filterArticles = function(){

renderArticles(window._siteData || {});

};

window.openArticle = async function(key){

const snap = await get(ref(db,`site/articles/${key}`));

if(!snap.exists()) return;

const a = snap.val();

await update(ref(db,`site/articles/${key}`),{
reads:(a.reads || 0)+1
});

window.currentArticleLink = window.location.href.split("#")[0] + "#article-" + key;

document.getElementById("readerTitle").innerText = a.title;

document.getElementById("readerDate").innerText = a.date;

document.getElementById("readerContent").innerText = a.content;

const holder = document.getElementById("externalHolder");

if(a.externalLink){

holder.innerHTML = `
<a class="external-link"
href="${a.externalLink}"
target="_blank">

${window.langData[window.currentLang].critic}

</a>
`;

}
else{

holder.innerHTML = "";

}

document.getElementById("shareBtn").innerText =
window.langData[window.currentLang].share;

document.getElementById("readerPage")
.classList.add("active");

window.scrollTo(0,0);

};

window.shareArticle = async function(){

if(navigator.share){

await navigator.share({
title:document.getElementById("readerTitle").innerText,
url:window.currentArticleLink
});

}
else{

navigator.clipboard.writeText(window.currentArticleLink);

alert("تم نسخ رابط المقال");

}

};

window.closeReader = function(){

document.getElementById("readerPage")
.classList.remove("active");

};

});
</script>
