<script type="module">
function waitForFirebase(cb,tries=0){
  if(window._firebase){cb();}
  else if(tries<50){setTimeout(()=>waitForFirebase(cb,tries+1),100);}
}

waitForFirebase(async ()=>{
  const {db,ref,get,update} = window._firebase;

  const visitorKey = "visitor_counted";
  const visitorsRef = ref(db,"site/visitors");

  try{
    const snap = await get(visitorsRef);
    let currentVisitors = snap.exists() ? snap.val() : 0;

    if(!localStorage.getItem(visitorKey)){
      currentVisitors++;
      await update(ref(db),{
        "site/visitors": currentVisitors
      });
      localStorage.setItem(visitorKey,"true");
    }

    document.getElementById("visitorsCount").innerText =
      "عدد الزوار: " + currentVisitors;

  }catch(e){
    console.log(e);
  }
});
</script>
